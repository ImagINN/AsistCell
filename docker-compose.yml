services:

  # ──────────────────────────────────────────────────────────────
  # MESSAGE BROKER — RabbitMQ
  # Management UI: http://localhost:15672
  # ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: asistcell-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"     # AMQP protokolü (servisler buraya bağlanır)
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # IDENTITY SERVICE — PostgreSQL
  # Port: 5433 (host) → 5432 (container)
  # ──────────────────────────────────────────────────────────────
  identity-postgres:
    image: postgres:16-alpine
    container_name: asistcell-identity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${IDENTITY_POSTGRES_DB}
      POSTGRES_USER: ${IDENTITY_POSTGRES_USER}
      POSTGRES_PASSWORD: ${IDENTITY_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - identity_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IDENTITY_POSTGRES_USER} -d ${IDENTITY_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # AI SERVICE — PostgreSQL
  # Port: 5434 (host) → 5432 (container)
  # ──────────────────────────────────────────────────────────────
  ai-postgres:
    image: postgres:16-alpine
    container_name: asistcell-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AI_POSTGRES_DB}
      POSTGRES_USER: ${AI_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AI_POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - ai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AI_POSTGRES_USER} -d ${AI_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # TICKET SERVICE — MongoDB
  # Port: 27017
  # ──────────────────────────────────────────────────────────────
  ticket-mongo:
    image: mongo:7
    container_name: asistcell-ticket-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${TICKET_MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${TICKET_MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${TICKET_MONGO_INITDB_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - ticket_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # GAMIFICATION SERVICE — PostgreSQL
  # Port: 5435 (host) → 5432 (container)
  # ──────────────────────────────────────────────────────────────
  gamification-postgres:
    image: postgres:16-alpine
    container_name: asistcell-gamification-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GAMIFICATION_POSTGRES_DB}
      POSTGRES_USER: ${GAMIFICATION_POSTGRES_USER}
      POSTGRES_PASSWORD: ${GAMIFICATION_POSTGRES_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - gamification_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GAMIFICATION_POSTGRES_USER} -d ${GAMIFICATION_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # GAMIFICATION SERVICE — Redis
  # Port: 6379
  # ──────────────────────────────────────────────────────────────
  gamification-redis:
    image: redis:7-alpine
    container_name: asistcell-gamification-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - gamification_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # API GATEWAY — Kong (DB-less)
  # Proxy:      http://localhost:8000
  # Admin API:  http://localhost:8001 (read-only in DB-less mode)
  # Config:     ./kong.yml (declarative)
  # ──────────────────────────────────────────────────────────────
  kong:
    image: kong:3.9
    container_name: asistcell-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"                                          # DB-less mod
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"                            # Admin API
      KONG_PROXY_LISTEN: "0.0.0.0:8000"                            # Proxy
      KONG_LOG_LEVEL: notice
      # .env dosyasındaki JWT_SECRET, kong.yml'deki ${JWT_SECRET} yerine geçer
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8000:8000"   # Proxy — tüm istemci istekleri buraya gelir
      - "8001:8001"   # Admin API — config reload, durum sorgulama
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml:ro   # read-only mount
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

# ──────────────────────────────────────────────────────────────
# NAMED VOLUMES
# ──────────────────────────────────────────────────────────────
volumes:
  rabbitmq_data:
  identity_postgres_data:
  ai_postgres_data:
  ticket_mongo_data:
  gamification_postgres_data:
  gamification_redis_data:
