services:

  # ──────────────────────────────────────────────────────────────
  # MESSAGE BROKER — RabbitMQ
  # Management UI: http://localhost:15672
  # ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: asistcell-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"     # AMQP protokolü (servisler buraya bağlanır)
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # IDENTITY SERVICE — PostgreSQL
  # Port: 5433 (host) → 5432 (container)
  # ──────────────────────────────────────────────────────────────
  identity-postgres:
    image: postgres:16-alpine
    container_name: asistcell-identity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${IDENTITY_POSTGRES_DB}
      POSTGRES_USER: ${IDENTITY_POSTGRES_USER}
      POSTGRES_PASSWORD: ${IDENTITY_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - identity_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IDENTITY_POSTGRES_USER} -d ${IDENTITY_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # AI SERVICE — PostgreSQL
  # Port: 5434 (host) → 5432 (container)
  # ──────────────────────────────────────────────────────────────
  ai-postgres:
    image: postgres:16-alpine
    container_name: asistcell-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AI_POSTGRES_DB}
      POSTGRES_USER: ${AI_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AI_POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - ai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AI_POSTGRES_USER} -d ${AI_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # TICKET SERVICE — MongoDB
  # Port: 27017
  # ──────────────────────────────────────────────────────────────
  ticket-mongo:
    image: mongo:7
    container_name: asistcell-ticket-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${TICKET_MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${TICKET_MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${TICKET_MONGO_INITDB_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - ticket_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # GAMIFICATION SERVICE — PostgreSQL
  # Port: 5435 (host) → 5432 (container)
  # ──────────────────────────────────────────────────────────────
  gamification-postgres:
    image: postgres:16-alpine
    container_name: asistcell-gamification-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GAMIFICATION_POSTGRES_DB}
      POSTGRES_USER: ${GAMIFICATION_POSTGRES_USER}
      POSTGRES_PASSWORD: ${GAMIFICATION_POSTGRES_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - gamification_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GAMIFICATION_POSTGRES_USER} -d ${GAMIFICATION_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # GAMIFICATION SERVICE — Redis
  # Port: 6379
  # ──────────────────────────────────────────────────────────────
  gamification-redis:
    image: redis:7-alpine
    container_name: asistcell-gamification-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - gamification_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # IDENTITY SERVICE — NestJS (TypeScript)
  # Port: 3001 (sadece Docker internal network — host'a açık değil)
  # Kong /api/v1/auth/** → bu servise yönlendirir
  # ──────────────────────────────────────────────────────────────
  identity-service:
    build:
      context: ./identity-service
      dockerfile: Dockerfile
    container_name: asistcell-identity-service
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://${IDENTITY_POSTGRES_USER}:${IDENTITY_POSTGRES_PASSWORD}@identity-postgres:5432/${IDENTITY_POSTGRES_DB}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      # Servisler arası audit endpoint'i için paylaşılan anahtar
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-asistcell-internal-dev-key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      # İlk kurulumda otomatik ADMIN hesabı (yoksa oluşturulur, varsa ADMIN'e yükseltilir)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    depends_on:
      identity-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/auth/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Port dışarıya açılmıyor — Kong iç ağ üzerinden erişir

  # ──────────────────────────────────────────────────────────────
  # TICKET SERVICE — NestJS (Node.js) + MongoDB + WebSockets
  # Port: 3002 (sadece Docker internal network)
  # Kong /api/v1/tickets/** → bu servise yönlendirir
  # ──────────────────────────────────────────────────────────────
  ticket-service:
    build:
      context: ./ticket-service
      dockerfile: Dockerfile
    container_name: asistcell-ticket-service
    restart: unless-stopped
    environment:
      PORT: 3002
      NODE_ENV: production
      MONGO_URI: mongodb://${TICKET_MONGO_INITDB_ROOT_USERNAME}:${TICKET_MONGO_INITDB_ROOT_PASSWORD}@ticket-mongo:27017/${TICKET_MONGO_INITDB_DATABASE}?authSource=admin
      RABBITMQ_URI: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      # Yetkisiz erişim denemelerini identity-service'in merkezi audit log'una yazmak için
      IDENTITY_SERVICE_URL: http://identity-service:3001
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-asistcell-internal-dev-key}
    depends_on:
      ticket-mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/api/v1/tickets/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────────────────────
  # AI SERVICE — FastAPI (Python)
  # Port: 3003 (sadece Docker internal network)
  # Kong /api/v1/ai/** → bu servise yönlendirir
  # ──────────────────────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: asistcell-ai-service
    restart: unless-stopped
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://${AI_POSTGRES_USER}:${AI_POSTGRES_PASSWORD}@ai-postgres:5432/${AI_POSTGRES_DB}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      # gemini-2.5-flash emekliye ayrıldı (404). "latest" alias'ı model
      # emekliliklerinden etkilenmez; .env ile override edilebilir.
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}
    depends_on:
      ai-postgres:
        condition: service_healthy
    healthcheck:
      # İmajda curl yok — Python stdlib ile kontrol ediyoruz
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:3003/api/v1/ai/health', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────────────────────
  # GAMIFICATION SERVICE — NestJS (Node.js) + Prisma + Redis
  # Port: 3004 (sadece Docker internal network)
  # Kong /api/v1/game/** → bu servise yönlendirir
  # ──────────────────────────────────────────────────────────────
  gamification-service:
    build:
      context: ./gamification-service
      dockerfile: Dockerfile
    container_name: asistcell-gamification-service
    restart: unless-stopped
    environment:
      PORT: 3004
      NODE_ENV: production
      DATABASE_URL: postgresql://${GAMIFICATION_POSTGRES_USER}:${GAMIFICATION_POSTGRES_PASSWORD}@gamification-postgres:5432/${GAMIFICATION_POSTGRES_DB}?schema=public
      REDIS_HOST: gamification-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_URI: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    depends_on:
      gamification-postgres:
        condition: service_healthy
      gamification-redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/api/v1/game/leaderboard"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────────────────────
  # API GATEWAY — Kong (DB-less)
  # Proxy:      http://localhost:8000
  # Admin API:  http://localhost:8001 (read-only in DB-less mode)

  # Config:     ./kong.yml (declarative)
  # ──────────────────────────────────────────────────────────────
  kong:
    image: kong:3.9
    container_name: asistcell-kong
    restart: unless-stopped
    # kong.yml bir şablondur: Kong declarative config env interpolasyonu
    # yapmadığı için ${JWT_SECRET} yer tutucusu açılışta awk ile gerçek
    # değere çevrilir, ardından orijinal entrypoint çalıştırılır.
    command:
      - sh
      - -c
      - >
        awk '{ n=split($$0, p, /\$$\{JWT_SECRET\}/); line=p[1];
        for(i=2;i<=n;i++) line=line ENVIRON["JWT_SECRET"] p[i]; print line }'
        /kong-template/kong.yml > /tmp/kong.yml
        && exec /docker-entrypoint.sh kong docker-start
    environment:
      KONG_DATABASE: "off"                                          # DB-less mod
      KONG_DECLARATIVE_CONFIG: /tmp/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"                            # Admin API
      KONG_PROXY_LISTEN: "0.0.0.0:8000"                            # Proxy
      KONG_LOG_LEVEL: notice
      # kong.yml'deki ${JWT_SECRET} yerine geçer.
      # Identity Service access token'ları JWT_ACCESS_SECRET ile imzalar;
      # Kong da aynı secret ile doğrulamalı — tek kaynak: JWT_ACCESS_SECRET.
      JWT_SECRET: ${JWT_ACCESS_SECRET}
    ports:
      - "8000:8000"   # Proxy — tüm istemci istekleri buraya gelir
      - "8001:8001"   # Admin API — config reload, durum sorgulama
    volumes:
      - ./kong.yml:/kong-template/kong.yml:ro   # şablon (read-only mount)
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ──────────────────────────────────────────────────────────────
  # ADMIN PANEL — React Web App
  # Port: 3000
  # ──────────────────────────────────────────────────────────────
  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: asistcell-admin-panel
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      kong:
        condition: service_healthy

# ──────────────────────────────────────────────────────────────
# NAMED VOLUMES
# ──────────────────────────────────────────────────────────────
volumes:
  rabbitmq_data:
  identity_postgres_data:
  ai_postgres_data:
  ticket_mongo_data:
  gamification_postgres_data:
  gamification_redis_data:
